services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fnb_hq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fnb_hq"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile.prod
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fnb_hq?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.prod
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
